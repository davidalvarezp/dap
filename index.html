    /* ── Scanlines ── */

      inset: 0;
      z-index: 2;
      pointer-events: none;

        transparent 2px,

    .ring:nth-child(2) { width: 300px; height: 300px; animation-delay: 2.3s; }

  <!-- Particle system -->
  <script>
  (() => {
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');

    const CONFIG = {
      particleCount : 110,
      maxDist       : 145,
      speed         : 0.38,
      dotRadius     : 1.8,
      dotColor      : 'rgba(99,210,255,',
      lineColor     : 'rgba(99,210,255,',
      mouse         : { x: -9999, y: -9999, radius: 160 },
    };

    let W, H, particles;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function createParticle() {
      const angle = Math.random() * Math.PI * 2;
      const spd   = CONFIG.speed * (0.4 + Math.random() * 0.9);
      return {
        x  : Math.random() * W,
        y  : Math.random() * H,
        vx : Math.cos(angle) * spd,
        vy : Math.sin(angle) * spd,
        r  : 0.6 + Math.random() * 1.4,
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: CONFIG.particleCount }, createParticle);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Update + wrap
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        if (p.y < -10) p.y = H + 10;
        if (p.y > H + 10) p.y = -10;
      }

      // Lines
      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
          const b    = particles[j];
          const dx   = a.x - b.x;
          const dy   = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONFIG.maxDist) {
            const alpha = (1 - dist / CONFIG.maxDist) * 0.38;
            ctx.beginPath();
            ctx.strokeStyle = CONFIG.lineColor + alpha + ')';
            ctx.lineWidth   = 0.7;
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // Dots
      for (const p of particles) {
        // mouse repulsion glow
        const mdx  = p.x - CONFIG.mouse.x;
        const mdy  = p.y - CONFIG.mouse.y;
        const md   = Math.sqrt(mdx * mdx + mdy * mdy);
        const near = md < CONFIG.mouse.radius;
        const r    = near ? p.r * 1.8 : p.r;
        const alpha = near ? 0.95 : 0.65;

        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = CONFIG.dotColor + alpha + ')';
        if (near) {
          ctx.shadowBlur  = 10;
          ctx.shadowColor = 'rgba(99,210,255,0.8)';
        }
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      requestAnimationFrame(draw);
    }

    // Mouse / touch
    window.addEventListener('mousemove', e => {
      CONFIG.mouse.x = e.clientX;
      CONFIG.mouse.y = e.clientY;
    });
    window.addEventListener('touchmove', e => {
      CONFIG.mouse.x = e.touches[0].clientX;
      CONFIG.mouse.y = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('mouseleave', () => {
      CONFIG.mouse.x = -9999;
      CONFIG.mouse.y = -9999;
    });

    window.addEventListener('resize', () => { resize(); });

    init();
    draw();
  })();
  </script>
